<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Gap Analysis</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='logo.png') }}" alt="SkillSync Logo">
        <nav>
            <a href="{{ url_for('intern_dashboard') }}">Dashboard</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </nav>
    </header>
    <div class="container">
        <h1>Skill Gap Analysis</h1>
        {% for gap in gaps %}
            <div class="card">
                <h2>{{ gap.internship }}</h2>
                <p><strong>Missing Skills:</strong> {{ gap.missing_skills | join(', ') }}</p>
                <p><strong>Recommended Courses:</strong></p>
                <ul>
                    {% for course, link in gap.courses %}
                        <li><a href="{{ link }}" target="_blank">{{ course }}</a></li>
                    {% endfor %}
                </ul>
            </div>
        {% endfor %}
    </div>
</body>
</html>
