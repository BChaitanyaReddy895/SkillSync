<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Signup - SkillSync</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="form-container">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="SkillSync Logo" class="logo">
        <h2>Admin Signup</h2>
        <form method="POST" action="{{ url_for('admin_signup') }}">
            <input type="text" name="name" class="input-field" placeholder="Name" required>
            <input type="email" name="email" class="input-field" placeholder="Email" required>
            <input type="password" name="password" class="input-field" placeholder="Password" required>
            <input type="text" name="secret_code" class="input-field" placeholder="Secret Code" required>
            <button type="submit" class="button">Sign Up</button>
        </form>
        <p>Already have an account? <a href="{{ url_for('admin_login') }}">Login</a></p>
        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endwith %}
        </div>
    </div>
</body>
</html>
