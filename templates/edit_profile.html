<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - SkillSync</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(120deg, #e0f7fa 0%, #f4f4f9 100%);
            min-height: 100vh;
        }

        header {
            background-color: #00796b;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header img {
            height: 50px;
        }

        nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        nav span {
            font-size: 16px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 8px 16px;
            border: 1px solid white;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        nav a:hover {
            background-color: white;
            color: #00796b;
        }

        .container {
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: #00796b;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.2rem;
        }

        .form-container {
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .input-field {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            background: #fafafa;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #00796b;
            outline: none;
        }

        .button {
            display: inline-block;
            padding: 14px 28px;
            background: linear-gradient(90deg, #00796b 60%, #26a69a 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 500;
            border: none;
            transition: background 0.2s;
            cursor: pointer;
            margin: 10px 5px;
        }

        .button:hover {
            background: linear-gradient(90deg, #005a4f 60%, #00796b 100%);
        }

        .cancel-link {
            display: inline-block;
            padding: 14px 28px;
            background: #ccc;
            color: #333;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 500;
            margin: 10px 5px;
            transition: background 0.2s;
        }

        .cancel-link:hover {
            background: #bdbdbd;
        }

        .flash-messages {
            margin: 10px 0 18px 0;
        }

        .flash-messages .success {
            color: #2e7d32;
            background: #e8f5e9;
            border-left: 4px solid #2e7d32;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 6px;
        }

        .flash-messages .error, .flash-messages .danger {
            color: #c62828;
            background: #ffebee;
            border-left: 4px solid #c62828;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 6px;
        }

        label {
            display: block;
            margin: 10px 0 5px;
            color: #00796b;
            font-weight: 500;
        }

        @media (max-width: 700px) {
            .container {
                max-width: 98vw;
                padding: 8px 2vw;
            }

            .form-container {
                max-width: 90%;
                padding: 15px;
            }

            .input-field {
                font-size: 12px;
                padding: 8px;
            }

            .button, .cancel-link {
                font-size: 1rem;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='logo.png') }}" alt="SkillSync Logo">
        <nav>
            <span>Welcome, {{ session.get('user_name', 'User') }}</span>
            <a href="{{ url_for('logout') }}">Logout</a>
        </nav>
    </header>
    <div class="container">
        <h1>Edit Profile</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <div class="form-container">
            <form action="{{ url_for('edit_profile') }}" method="POST" autocomplete="off">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" class="input-field" value="{{ user.name | default('') }}" required>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="input-field" value="{{ user.email | default('') }}" required>
                <label for="password">New Password (Optional)</label>
                <input type="password" id="password" name="password" class="input-field">
                <button type="submit" class="button">Save Changes</button>
                <a href="{{ url_for(session.get('role') == 'recruiter' and 'recruiter_dashboard' or 'intern_dashboard') }}" class="cancel-link">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
