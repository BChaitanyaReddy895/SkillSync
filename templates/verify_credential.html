<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Credential - SkillSync</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='logo.png') }}" alt="SkillSync Logo">
        <nav>
            <a href="{{ url_for('index') }}">Back to Home</a>
        </nav>
    </header>
    <div class="container">
        <h1>Verify Credential</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form action="{{ url_for('verify_credential') }}" method="POST">
            <label for="credential_hash">Credential Hash:</label>
            <input type="text" id="credential_hash" name="credential_hash" required>
            <label for="signature">Signature (Hex):</label>
            <input type="text" id="signature" name="signature" required>
            <button type="submit">Verify</button>
        </form>
    </div>
</body>
</html>
