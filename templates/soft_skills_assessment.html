<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soft Skills Assessment - SkillSync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(120deg, #e0f7fa 0%, #f4f4f9 100%);
            min-height: 100vh;
        }
        header {
            background-color: #00796b;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header img {
            height: 50px;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 8px 16px;
            border: 1px solid white;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        nav a:hover {
            background-color: white;
            color: #00796b;
        }
        .container {
            padding: 20px;
            max-width: 500px;
            margin: 40px auto;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 32px 24px 24px 24px;
            margin-bottom: 24px;
        }
        h1 {
            color: #00796b;
            text-align: center;
            margin-bottom: 24px;
            font-size: 2rem;
        }
        label {
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
            display: block;
        }
        input[type="number"] {
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #bdbdbd;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            background: #fafafa;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus {
            border-color: #00796b;
            outline: none;
        }
        .button {
            display: inline-block;
            padding: 14px 28px;
            background: linear-gradient(90deg, #00796b 60%, #26a69a 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 500;
            border: none;
            transition: background 0.2s;
            cursor: pointer;
            margin: 10px 5px 0 0;
        }
        .button:hover {
            background: linear-gradient(90deg, #005a4f 60%, #00796b 100%);
        }
        .flash-messages {
            margin: 10px 0 18px 0;
        }
        .flash-messages .success {
            color: #2e7d32;
            background: #e8f5e9;
            border-left: 4px solid #2e7d32;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 6px;
        }
        .flash-messages .error, .flash-messages .danger {
            color: #c62828;
            background: #ffebee;
            border-left: 4px solid #c62828;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 6px;
        }
        .back-link {
            display: inline-block;
            margin-top: 18px;
            color: #00796b;
            text-decoration: none;
            font-weight: 500;
            border: 1px solid #00796b;
            border-radius: 5px;
            padding: 8px 16px;
            transition: background 0.2s, color 0.2s;
        }
        .back-link:hover {
            background: #00796b;
            color: white;
        }
        @media (max-width: 700px) {
            .container {
                max-width: 98vw;
                padding: 8px 2vw;
            }
            .card {
                max-width: 100%;
                padding: 15px;
            }
            .button {
                font-size: 1rem;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='logo.png') }}" alt="SkillSync Logo">
        <nav>
            <a href="{{ url_for('intern_dashboard') }}">Back to Dashboard</a>
        </nav>
    </header>
    <div class="container">
        <div class="card">
            <h1>Soft Skills Assessment</h1>
            <div class="flash-messages">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="{{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
            </div>
            <form method="POST">
                <label>Problem Solving (1-5):</label>
                <input type="number" name="problem_solving" min="1" max="5" required>
                <label>Teamwork (1-5):</label>
                <input type="number" name="teamwork" min="1" max="5" required>
                <label>Creativity (1-5):</label>
                <input type="number" name="creativity" min="1" max="5" required>
                <button type="submit" class="button">Submit Assessment</button>
            </form>
            <a href="{{ url_for('intern_dashboard') }}" class="back-link">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
