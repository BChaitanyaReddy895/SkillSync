<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Sign Up - SkillSync</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='logo.png') }}" alt="SkillSync Logo">
        <nav>
            <a href="{{ url_for('index') }}">Back to Home</a>
        </nav>
    </header>
    <div class="container">
        <h1>Intern Sign Up</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form id="signup-form" action="{{ url_for('intern_signup') }}" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="{{ request.form.get('name', '') }}" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ request.form.get('email', '') }}" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <span id="password-error" class="error-message"></span>

            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>

            <label for="skills">Skills (comma-separated):</label>
            <input type="text" id="skills" name="skills" value="{{ request.form.get('skills', '') }}" required>
            <span id="skills-error" class="error-message"></span>

            <label for="education">Education:</label>
            <input type="text" id="education" name="education" value="{{ request.form.get('education', '') }}">

            <label for="certifications">Certifications:</label>
            <input type="text" id="certifications" name="certifications" value="{{ request.form.get('certifications', '') }}">

            <button type="submit">Sign Up</button>
        </form>
    </div>
    <script>
        document.getElementById('signup-form').addEventListener('submit', function(event) {
            let password = document.getElementById('password').value;
            let confirmPassword = document.getElementById('confirm_password').value;
            let skills = document.getElementById('skills').value.trim();
            let passwordError = document.getElementById('password-error');
            let skillsError = document.getElementById('skills-error');
            let isValid = true;

            passwordError.textContent = '';
            skillsError.textContent = '';

            if (password !== confirmPassword) {
                passwordError.textContent = 'Passwords do not match.';
                isValid = false;
            }

            if (!skills) {
                skillsError.textContent = 'Skills are required.';
                isValid = false;
            }

            if (!isValid) {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
