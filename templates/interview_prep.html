<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Preparation</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='logo.png') }}" alt="SkillSync Logo">
        <nav>
            <a href="{{ url_for('intern_dashboard') }}">Dashboard</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </nav>
    </header>
    <div class="container">
        <h1>Interview Prep for {{ internship.role }}</h1>
        <form method="POST">
            {% for question in questions %}
                <div class="form-group">
                    <label>{{ loop.index }}. {{ question }}</label>
                    <textarea name="answers" rows="4" required></textarea>
                </div>
            {% endfor %}
            <button type="submit" class="button">Submit Answers</button>
        </form>
        {% if feedback %}
            <h2>Feedback</h2>
            <ul>
                {% for fb in feedback %}
                    <li>{{ fb }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    </div>
</body>
</html>
